name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

jobs:
  build-and-test:
    name: Build, Lint, and Test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run build
        run: npm run build

      # Add type-check and test commands here when they are configured in turbo.json
      # - name: Run type-check
      #   run: npm run type-check
      #
      # - name: Run tests
      #   run: npm run test

      - name: Run audit
        run: npm audit --audit-level=high || true
