version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: siryia-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-siryia}
    ports:
      - "5432:5432"
    volumes:
      - siryia-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: siryia-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - siryia-redis-data:/data

volumes:
  siryia-db-data:
  siryia-redis-data:
